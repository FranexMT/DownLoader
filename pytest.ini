[pytest]
testpaths = tests
addopts =
    --cov=src
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=term-missing
    --cov-fail-under=80
    --html=test-results/report.html
    --self-contained-html
    -v
python_files = test_*.py
python_classes = Test*
python_functions = test_*
